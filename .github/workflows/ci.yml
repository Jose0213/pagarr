name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          # node:sqlite (used by the Datastore module) shipped experimental
          # in 22.5.0 but required the --experimental-sqlite flag until
          # 22.13.0, which dropped that requirement. Pin to a version
          # confirmed past that boundary -- verified against Node's own
          # doc/api/sqlite.md per tag, not assumed from the "22.5+" release
          # note alone (that mismatch is what broke the first CI run).
          node-version: 22.14.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      # --experimental-sqlite kept as a belt-and-suspenders safety net in
      # case the pinned version above ever regresses to needing it again;
      # harmless no-op flag on versions where it's no longer required.
      - run: pnpm test
        env:
          NODE_OPTIONS: --experimental-sqlite
      - run: pnpm build
